# ============================================================
#  Сайт 1: mmashvarat.tj
#  Публичный сайт + админка контента + общий API.
#  Общая админка пользователей вынесена на поддомен admin. (см. ниже).
# ============================================================

upstream api_backend       { server api:8080; }
upstream web_site1_backend { server web-site1:80; }
upstream admin_site1_backend { server admin-site1:80; }
upstream admin_users_backend { server admin-users:80; }

# ---- Публичный сайт 1 ----
server {
    listen 80;
    server_name mmashvarat.tj www.mmashvarat.tj;

    # API проксируем на Go (браузер обращается к /api/...)
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # сайт 1 всегда ходит в API с ключом s1 — прокидываем заголовок
        proxy_set_header X-Site-Key s1;
    }

    location / {
        proxy_pass http://web_site1_backend;
        proxy_set_header Host $host;
    }
}

# ---- Админка контента сайта 1: admin.mmashvarat.tj ----
server {
    listen 80;
    server_name admin.mmashvarat.tj;

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Site-Key s1;
    }

    location / {
        proxy_pass http://admin_site1_backend;
        proxy_set_header Host $host;
    }
}

# ---- ОБЩАЯ админка пользователей: users.mmashvarat.tj ----
# (создание пользователей сразу в оба сайта)
server {
    listen 80;
    server_name users.mmashvarat.tj;

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # общая админка не привязана к одному сайту — ключ не проставляем
    }

    location / {
        proxy_pass http://admin_users_backend;
        proxy_set_header Host $host;
    }
}
