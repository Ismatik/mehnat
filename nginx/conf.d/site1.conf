# ============================================================
#  Сайт 1: mmashvarat.tj (+ admin. + users.)
#  Каждый домен → СВОЙ сервис. Адреса резолвятся в рантайме через Docker DNS
#  (resolver в nginx.conf) — переменные в proxy_pass, БЕЗ upstream-блоков,
#  иначе после пересборки контейнеров IP «уезжают» и сайт↔админка путаются.
#
#  proxy_pass с переменной в host требует явного URI:
#   - /api/  → срезаем префикс (rewrite) и шлём на api:8080
#   - /      → пробрасываем как есть ($request_uri)
# ============================================================

# ---- Публичный сайт 1 ----
server {
    listen 80;
    server_name mmashvarat.tj www.mmashvarat.tj;

    location /api/ {
        set $api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Site-Key s1;   # сайт 1 → ключ s1
    }

    location / {
        set $app web-site1;
        proxy_pass http://$app:80$request_uri;
        proxy_set_header Host $host;
    }
}

# ---- Админка контента сайта 1: admin.mmashvarat.tj ----
server {
    listen 80;
    server_name admin.mmashvarat.tj;

    location /api/ {
        set $api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Site-Key s1;
    }

    location / {
        set $app admin-site1;
        proxy_pass http://$app:80$request_uri;
        proxy_set_header Host $host;
    }
}

# ---- ОБЩАЯ админка пользователей: users.mmashvarat.tj ----
server {
    listen 80;
    server_name users.mmashvarat.tj;

    location /api/ {
        set $api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # общая админка не привязана к сайту — X-Site-Key НЕ проставляем
    }

    location / {
        set $app admin-users;
        proxy_pass http://$app:80$request_uri;
        proxy_set_header Host $host;
    }
}
