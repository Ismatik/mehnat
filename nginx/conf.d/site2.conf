# ============================================================
#  Сайт 2: a-khorijakor.tj
#  Публичный сайт + админка контента.
#  (Общая админка пользователей одна на систему — см. site1.conf,
#   поддомен users.*. При желании можно повесить и на этот домен.)
# ============================================================

upstream web_site2_backend   { server web-site2:80; }
upstream admin_site2_backend { server admin-site2:80; }
# api_backend уже объявлен в site1.conf (upstream общий на весь nginx)

# ---- Публичный сайт 2 ----
server {
    listen 80;
    server_name a-khorijakor.tj www.a-khorijakor.tj;

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Site-Key s2;
    }

    location / {
        proxy_pass http://web_site2_backend;
        proxy_set_header Host $host;
    }
}

# ---- Админка контента сайта 2: admin.a-khorijakor.tj ----
server {
    listen 80;
    server_name admin.a-khorijakor.tj;

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Site-Key s2;
    }

    location / {
        proxy_pass http://admin_site2_backend;
        proxy_set_header Host $host;
    }
}
