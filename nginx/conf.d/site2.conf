# ============================================================
#  Сайт 2: a-khorijakor.tj (+ admin.)
#  Каждый домен → СВОЙ сервис. Runtime-резолв через Docker DNS (переменные в
#  proxy_pass), как в site1.conf — чтобы IP не «уезжали» после пересборки.
# ============================================================

# ---- Публичный сайт 2 ----
server {
    listen 80;
    server_name a-khorijakor.tj www.a-khorijakor.tj;

    location /api/ {
        set $api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Site-Key s2;   # сайт 2 → ключ s2
    }

    location / {
        set $app web-site2;
        proxy_pass http://$app:80$request_uri;
        proxy_set_header Host $host;
    }
}

# ---- Админка контента сайта 2: admin.a-khorijakor.tj ----
server {
    listen 80;
    server_name admin.a-khorijakor.tj;

    location /api/ {
        set $api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Site-Key s2;
    }

    location / {
        set $app admin-site2;
        proxy_pass http://$app:80$request_uri;
        proxy_set_header Host $host;
    }
}
