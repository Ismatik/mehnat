# ============================================================
#  ТОЛЬКО ДЛЯ ЛОКАЛЬНОГО ПРЕДПРОСМОТРА (docker-compose.override.yml).
#  Публикует каждое приложение на своём порту localhost и проксирует
#  /api на Go-API (тот же origin → работает вход и запросы из браузера).
#
#  Через Docker DNS (resolver 127.0.0.11) + переменные в proxy_pass —
#  адреса контейнеров резолвятся В РАНТАЙМЕ. Это важно: при пересборке
#  сервисов их IP меняются; без ре-резолва nginx проксировал бы на старые
#  IP (контент «путается» между приложениями).
#  В прод НЕ идёт — там маршрутизация по доменам в nginx/conf.d/*.
# ============================================================
worker_processes 1;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  client_max_body_size 50m;
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ---- Общая админка пользователей → http://localhost:8080 ----
  server {
    listen 8080;
    location /api/ { set $api api; rewrite ^/api/?(.*)$ /$1 break; proxy_pass http://$api:8080; proxy_set_header Host $host; }
    location / { set $app admin-users; proxy_pass http://$app:80$request_uri; proxy_set_header Host $host; }
  }

  # ---- Админка контента сайта 1 → http://localhost:8081 ----
  server {
    listen 8081;
    location /api/ { set $api api; rewrite ^/api/?(.*)$ /$1 break; proxy_pass http://$api:8080; proxy_set_header Host $host; proxy_set_header X-Site-Key s1; }
    location / { set $app admin-site1; proxy_pass http://$app:80$request_uri; proxy_set_header Host $host; }
  }

  # ---- Админка контента сайта 2 → http://localhost:8082 ----
  server {
    listen 8082;
    location /api/ { set $api api; rewrite ^/api/?(.*)$ /$1 break; proxy_pass http://$api:8080; proxy_set_header Host $host; proxy_set_header X-Site-Key s2; }
    location / { set $app admin-site2; proxy_pass http://$app:80$request_uri; proxy_set_header Host $host; }
  }

  # ---- Публичный сайт 1 → http://localhost:8083 ----
  server {
    listen 8083;
    location /api/ { set $api api; rewrite ^/api/?(.*)$ /$1 break; proxy_pass http://$api:8080; proxy_set_header Host $host; proxy_set_header X-Site-Key s1; }
    location / { set $app web-site1; proxy_pass http://$app:80$request_uri; proxy_set_header Host $host; }
  }

  # ---- Публичный сайт 2 → http://localhost:8084 ----
  server {
    listen 8084;
    location /api/ { set $api api; rewrite ^/api/?(.*)$ /$1 break; proxy_pass http://$api:8080; proxy_set_header Host $host; proxy_set_header X-Site-Key s2; }
    location / { set $app web-site2; proxy_pass http://$app:80$request_uri; proxy_set_header Host $host; }
  }
}
