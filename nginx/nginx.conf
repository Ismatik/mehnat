user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50m;   # загрузка изображений/документов в админках

    # Docker DNS: адреса сервисов резолвятся В РАНТАЙМЕ (valid=10s). Критично:
    # при пересборке (up -d --build) контейнеры получают НОВЫЕ IP; без ре-резолва
    # nginx проксировал бы на старые IP и путал бы сайт↔админку. Поэтому в
    # conf.d/* используем переменные в proxy_pass (а не upstream-блоки).
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
