# ============================================================
#  Локальный предпросмотр (не для прода). Автоматически подхватывается
#  docker compose. Публикует приложения на портах localhost и проксирует
#  /api на Go-API. Удали/переименуй этот файл для чистого прод-запуска.
#    http://localhost:8080  — общая админка пользователей
#    http://localhost:8081  — админка контента, сайт 1
#    http://localhost:8082  — админка контента, сайт 2
#    http://localhost:8083  — публичный сайт 1
#    http://localhost:8084  — публичный сайт 2
# ============================================================
services:
  preview:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/preview.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8083:8083"
      - "127.0.0.1:8084:8084"
    depends_on:
      - api
      - admin-users
      - admin-site1
      - admin-site2
      - web-site1
      - web-site2
